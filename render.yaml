services:
  - type: web
    plan: free
    name: fandangle
    runtime: python
    rootDir: homework2
    buildCommand: './build.sh'
    startCommand: 'python -m gunicorn movie_theater_booking.wsgi:application'
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
      - key: RENDER
        value: true
