{% extends 'bookings/base.html' %}

{% block title %}Booking History{% endblock %}

{% block content %}
  <h1>Your Booking History</h1>
  {% for booking in bookings %}
    <div>
      <p>Movie: {{ booking.bookMovie.movieTitle }}</p>
      <p>Date: {{ booking.bookTime }}</p>
    </div>
  {% endfor %}
{% endblock %}
